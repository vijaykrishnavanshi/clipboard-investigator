<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clipboard Investigator</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%236C5CE7'/%3E%3Cstop offset='100%25' style='stop-color:%23a855f7'/%3E%3C/linearGradient%3E%3ClinearGradient id='cl' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23ffffff'/%3E%3Cstop offset='100%25' style='stop-color:%23f0e6ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='16' y='16' width='480' height='480' rx='96' fill='url(%23bg)'/%3E%3Crect x='136' y='160' width='240' height='260' rx='16' fill='url(%23cl)' opacity='.95'/%3E%3Crect x='196' y='120' width='120' height='60' rx='12' fill='url(%23cl)' opacity='.95'/%3E%3Crect x='220' y='108' width='72' height='36' rx='18' fill='url(%23bg)' stroke='%23fff' stroke-width='8'/%3E%3Ccircle cx='310' cy='300' r='60' fill='none' stroke='%236C5CE7' stroke-width='14' opacity='.85'/%3E%3Cline x1='352' y1='342' x2='392' y2='382' stroke='%236C5CE7' stroke-width='14' stroke-linecap='round' opacity='.85'/%3E%3Crect x='168' y='220' width='100' height='10' rx='5' fill='%236C5CE7' opacity='.3'/%3E%3Crect x='168' y='248' width='80' height='10' rx='5' fill='%236C5CE7' opacity='.3'/%3E%3Crect x='168' y='276' width='90' height='10' rx='5' fill='%236C5CE7' opacity='.3'/%3E%3Crect x='168' y='340' width='70' height='10' rx='5' fill='%236C5CE7' opacity='.3'/%3E%3Crect x='168' y='368' width='85' height='10' rx='5' fill='%236C5CE7' opacity='.3'/%3E%3C/svg%3E">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { text-size-adjust: none; -webkit-text-size-adjust: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px; line-height: 1.5; color: #333;
      padding: 2rem; max-width: 960px; margin: 0 auto;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.25rem; }
    .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
    code, pre {
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 0.85em;
    }
    a { color: #555; text-decoration: none; }
    a:hover { text-decoration: underline; }
    button {
      font: inherit; font-size: 0.85rem; appearance: none;
      border: 1px solid #ccc; border-radius: 4px;
      padding: 0.35em 0.75em; background: #fff; color: #333; cursor: pointer;
    }
    button:hover { background: #f5f5f5; border-color: #999; }
    button:active { background: #eee; }
    kbd {
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 0.8em;
      border: 1px solid #ccc; border-radius: 3px;
      padding: 0.1em 0.35em; background: #f7f7f7;
    }
    .intro {
      border: 1px solid #e0e0e0; border-radius: 6px;
      padding: 1.25rem 1.5rem; background: #fafafa;
    }
    .intro p { font-size: 0.9rem; margin-bottom: 0.75rem; color: #555; }
    .intro-actions {
      display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
    }
    .intro-actions span { color: #999; font-size: 0.8rem; }
    #app { flex: 1; }
    .results-header {
      display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;
    }
    .results-header .source { font-size: 0.85rem; color: #888; }
    .badge {
      font-size: 0.75rem; color: #888; background: #f0f0f0;
      border-radius: 3px; padding: 0.15em 0.5em; margin-left: 0.5rem;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; font-size: 0.75rem; font-weight: 500; color: #999;
      text-transform: uppercase; letter-spacing: 0.04em;
      padding: 0.5em 0.75em; border-bottom: 1px solid #e0e0e0;
    }
    td {
      padding: 0.6em 0.75em; vertical-align: top;
      border-bottom: 1px solid #f0f0f0;
    }
    tr:last-child td { border-bottom: none; }
    td.type-col { white-space: nowrap; width: 1%; color: #666; }
    td.size-col { white-space: nowrap; width: 1%; color: #999; font-size: 0.8em; }
    .data-content {
      background: #f7f7f7; border-radius: 4px; padding: 0.5em 0.75em;
      white-space: pre-wrap; word-break: break-all; max-height: 300px;
      overflow: auto; font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 0.8rem; color: #444; line-height: 1.4;
    }
    .data-empty { color: #bbb; font-style: italic; }
    .data-binary { color: #999; font-size: 0.8em; }
    td img {
      max-width: 100%; max-height: 200px; border-radius: 4px;
      border: 1px solid #e0e0e0;
    }
    footer {
      margin-top: auto; padding-top: 1.5rem;
      border-top: 1px solid #f0f0f0; font-size: 0.75rem; color: #bbb;
    }
    .drop-highlight { outline: 2px dashed #999; outline-offset: -2px; }
    .error-msg {
      background: #fff3f3; border: 1px solid #e8c8c8; border-radius: 4px;
      padding: 0.5em 0.75em; color: #a44; font-size: 0.85rem; margin-top: 0.75rem;
    }
    @media (max-width: 600px) { body { padding: 1rem; } }
  </style>
</head>
<body>
  <h1 style="display:flex;align-items:center;gap:0.5rem;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="28" height="28" style="flex-shrink:0;">
      <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6C5CE7"/><stop offset="100%" style="stop-color:#a855f7"/></linearGradient><linearGradient id="cl" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#ffffff"/><stop offset="100%" style="stop-color:#f0e6ff"/></linearGradient></defs>
      <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>
      <rect x="136" y="160" width="240" height="260" rx="16" fill="url(#cl)" opacity=".95"/>
      <rect x="196" y="120" width="120" height="60" rx="12" fill="url(#cl)" opacity=".95"/>
      <rect x="220" y="108" width="72" height="36" rx="18" fill="url(#bg)" stroke="#fff" stroke-width="8"/>
      <circle cx="310" cy="300" r="60" fill="none" stroke="#6C5CE7" stroke-width="14" opacity=".85"/>
      <line x1="352" y1="342" x2="392" y2="382" stroke="#6C5CE7" stroke-width="14" stroke-linecap="round" opacity=".85"/>
      <rect x="168" y="220" width="100" height="10" rx="5" fill="#6C5CE7" opacity=".3"/>
      <rect x="168" y="248" width="80" height="10" rx="5" fill="#6C5CE7" opacity=".3"/>
      <rect x="168" y="276" width="90" height="10" rx="5" fill="#6C5CE7" opacity=".3"/>
      <rect x="168" y="340" width="70" height="10" rx="5" fill="#6C5CE7" opacity=".3"/>
      <rect x="168" y="368" width="85" height="10" rx="5" fill="#6C5CE7" opacity=".3"/>
    </svg>
    Clipboard Investigator
  </h1>
  <p class="subtitle">Inspect clipboard contents by pasting, dropping, or reading directly.</p>
  <div id="app"></div>
  <footer>
    Based on <a href="https://github.com/evercoder/clipboard-inspector">clipboard-inspector</a>
    by <a href="https://labs.moqups.com">Moqups Labs</a>.
    &middot; <a href="https://github.com/vijaykrishnavanshi/clipboard-investigator">Source on GitHub</a>
  </footer>
  <script>
    const appEl = document.getElementById('app');

    function h(tag, attrs, ...children) {
      const el = document.createElement(tag);
      if (attrs) {
        for (const [key, val] of Object.entries(attrs)) {
          if (val === undefined || val === null) continue;
          if (key === 'className') el.className = val;
          else if (key.startsWith('on')) el.addEventListener(key.slice(2).toLowerCase(), val);
          else el.setAttribute(key, val);
        }
      }
      for (const child of children.flat()) {
        if (child == null) continue;
        el.appendChild(typeof child === 'string' || typeof child === 'number'
          ? document.createTextNode(String(child))
          : child);
      }
      return el;
    }

    function formatSize(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    function isImageType(type) {
      return /png|tiff|image|jpeg|gif|bmp|ico|webp/i.test(type);
    }

    // --- Normalize clipboard data ---

    function normalizeDataTransfer(dt) {
      const entries = [];
      const types = Array.from(dt.types);
      for (const type of types) {
        const data = dt.getData(type);
        entries.push({ type, data, size: data.length, isText: true });
      }
      if (dt.files) {
        for (const file of Array.from(dt.files)) {
          entries.push({
            type: file.type || 'application/octet-stream',
            data: null, size: file.size, isText: false,
            file, label: file.name,
          });
        }
      }
      return entries;
    }

    async function readClipboardAPI() {
      const entries = [];
      try {
        const items = await navigator.clipboard.read();
        for (const item of items) {
          for (const type of item.types) {
            const blob = await item.getType(type);
            if (type.startsWith('text/')) {
              const text = await blob.text();
              entries.push({ type, data: text, size: blob.size, isText: true });
            } else if (type.startsWith('image/')) {
              const buf = await blob.arrayBuffer();
              const b64 = arrayBufferToBase64(buf);
              entries.push({ type, data: b64, size: blob.size, isText: false, isBase64: true });
            } else {
              const buf = await blob.arrayBuffer();
              const b64 = arrayBufferToBase64(buf);
              entries.push({ type, data: b64, size: blob.size, isText: false, isBase64: true });
            }
          }
        }
      } catch (err) {
        throw err;
      }
      return entries;
    }

    function arrayBufferToBase64(buffer) {
      let binary = '';
      const bytes = new Uint8Array(buffer);
      for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    // --- Rendering ---

    function renderEntries(entries, source) {
      const container = h('div', null);
      const header = h('div', { className: 'results-header' },
        h('button', { onClick: () => showIntro() }, '\u2190 Back'),
        h('span', { className: 'source' }, source),
        h('span', { className: 'badge' }, `${entries.length} type${entries.length !== 1 ? 's' : ''}`)
      );
      container.appendChild(header);

      const table = h('table', null,
        h('thead', null,
          h('tr', null,
            h('th', null, 'Type'),
            h('th', null, 'Content'),
            h('th', null, 'Size')
          )
        )
      );
      const tbody = h('tbody', null);

      for (const entry of entries) {
        const typeCell = h('td', { className: 'type-col' }, h('code', null, entry.type));

        let contentCell;
        if (entry.file) {
          const url = URL.createObjectURL(entry.file);
          if (entry.file.type && entry.file.type.startsWith('image/')) {
            contentCell = h('td', null,
              h('div', null, h('img', { src: url })),
              entry.label ? h('div', { className: 'data-binary' }, entry.label) : null
            );
          } else {
            contentCell = h('td', null,
              h('span', { className: 'data-binary' }, entry.label || 'binary file')
            );
          }
        } else if (entry.isText && entry.data) {
          contentCell = h('td', null, h('div', { className: 'data-content' }, entry.data));
        } else if (entry.isBase64 && entry.data && isImageType(entry.type)) {
          const mime = entry.type.startsWith('image/') ? entry.type : 'image/png';
          contentCell = h('td', null, h('img', { src: `data:${mime};base64,${entry.data}` }));
        } else if (entry.isBase64 && entry.data) {
          const preview = entry.data.length > 120 ? entry.data.substring(0, 120) + '\u2026' : entry.data;
          contentCell = h('td', null,
            h('div', { className: 'data-content data-binary' }, `base64: ${preview}`)
          );
        } else if (entry.data === '' || (entry.isText && !entry.data)) {
          contentCell = h('td', null, h('span', { className: 'data-empty' }, 'empty'));
        } else {
          contentCell = h('td', null, h('span', { className: 'data-empty' }, '\u2014'));
        }

        const sizeCell = h('td', { className: 'size-col' }, formatSize(entry.size));
        tbody.appendChild(h('tr', null, typeCell, contentCell, sizeCell));
      }

      table.appendChild(tbody);
      container.appendChild(table);
      return container;
    }

    function showIntro() {
      appEl.innerHTML = '';
      appEl.appendChild(h('div', { className: 'intro' },
        h('p', null, 'Paste, drop, or read clipboard to inspect its contents.'),
        h('div', { className: 'intro-actions' },
          h('button', {
            onClick: async () => {
              try {
                const entries = await readClipboardAPI();
                showResults(entries, 'Clipboard (read)');
              } catch (err) {
                showError('Clipboard access denied. Your browser may require a user gesture or permission. Try pasting instead (Ctrl+V / Cmd+V).');
              }
            },
          }, 'Read clipboard'),
          h('span', null, 'or press'),
          h('kbd', null, 'Ctrl+V'),
          h('span', null, '/'),
          h('kbd', null, '\u2318V'),
          h('span', null, 'or drop a file'),
        )
      ));
    }

    function showResults(entries, source) {
      appEl.innerHTML = '';
      if (entries.length === 0) {
        appEl.appendChild(h('div', { className: 'intro' },
          h('p', null, 'Clipboard is empty or no readable types found.'),
          h('div', { className: 'intro-actions' },
            h('button', { onClick: () => showIntro() }, '\u2190 Back')
          )
        ));
        return;
      }
      appEl.appendChild(renderEntries(entries, source));
    }

    function showError(msg) {
      const existing = document.querySelector('.error-msg');
      if (existing) existing.remove();
      const el = h('div', { className: 'error-msg' }, msg);
      appEl.appendChild(el);
    }

    // --- Init ---

    showIntro();

    document.addEventListener('paste', async (e) => {
      e.preventDefault();
      // Grab DataTransfer data synchronously before it's invalidated
      const dtEntries = e.clipboardData
        ? normalizeDataTransfer(e.clipboardData)
        : [];
      // Try the Clipboard API for richer data (images, etc.)
      if (navigator.clipboard && navigator.clipboard.read) {
        try {
          const entries = await readClipboardAPI();
          if (entries.length > 0) {
            showResults(entries, 'Clipboard (paste)');
            return;
          }
        } catch (_) {
          // fall through to DataTransfer
        }
      }
      // Fallback to synchronously captured DataTransfer data
      if (dtEntries.length > 0) {
        showResults(dtEntries, 'Clipboard (paste)');
      }
    });

    document.addEventListener('dragover', (e) => {
      e.preventDefault();
      document.body.classList.add('drop-highlight');
    });

    document.addEventListener('dragleave', (e) => {
      if (!e.relatedTarget) document.body.classList.remove('drop-highlight');
    });

    document.addEventListener('drop', (e) => {
      e.preventDefault();
      document.body.classList.remove('drop-highlight');
      if (e.dataTransfer) {
        showResults(normalizeDataTransfer(e.dataTransfer), 'Drop (DataTransfer)');
      }
    });
  </script>
</body>
</html>
