<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="clip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0e6ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Clipboard body -->
  <rect x="136" y="160" width="240" height="260" rx="16" ry="16" fill="url(#clip)" opacity="0.95"/>

  <!-- Clipboard clip (top) -->
  <rect x="196" y="120" width="120" height="60" rx="12" ry="12" fill="url(#clip)" opacity="0.95"/>
  <rect x="220" y="108" width="72" height="36" rx="18" ry="18" fill="url(#bg)" stroke="#ffffff" stroke-width="8"/>

  <!-- Magnifying glass -->
  <circle cx="310" cy="300" r="60" fill="none" stroke="#6C5CE7" stroke-width="14" opacity="0.85"/>
  <line x1="352" y1="342" x2="392" y2="382" stroke="#6C5CE7" stroke-width="14" stroke-linecap="round" opacity="0.85"/>

  <!-- Text lines on clipboard -->
  <rect x="168" y="220" width="100" height="10" rx="5" fill="#6C5CE7" opacity="0.3"/>
  <rect x="168" y="248" width="80" height="10" rx="5" fill="#6C5CE7" opacity="0.3"/>
  <rect x="168" y="276" width="90" height="10" rx="5" fill="#6C5CE7" opacity="0.3"/>
  <rect x="168" y="340" width="70" height="10" rx="5" fill="#6C5CE7" opacity="0.3"/>
  <rect x="168" y="368" width="85" height="10" rx="5" fill="#6C5CE7" opacity="0.3"/>
</svg>
